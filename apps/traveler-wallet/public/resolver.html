<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archon DID Resolver</title>
  <style>
    :root { --teal:#0b6b6b; --ink:#1f2733; --muted:#5b6675; --bg:#f5f7fa; --card:#fff; --line:#e3e8ef; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--ink); background:var(--bg); }
    header { background:var(--teal); color:#fff; padding:20px 0; }
    .wrap { max-width:900px; margin:0 auto; padding:0 20px; }
    h1 { margin:0; font-size:1.3rem; }
    .sub { opacity:.9; font-size:.9rem; margin-top:4px; }
    main { padding:24px 0 60px; }
    .bar { display:flex; gap:8px; margin-bottom:20px; }
    .bar input { flex:1; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-family:monospace; font-size:13px; }
    .bar button { padding:10px 18px; border:0; border-radius:8px; background:var(--teal); color:#fff; font-weight:600; cursor:pointer; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px 22px; margin-bottom:16px; }
    .card h2 { margin:0 0 12px; font-size:1.05rem; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .chip { font-size:.78rem; font-weight:600; padding:4px 10px; border-radius:999px; border:1px solid var(--line); background:#f0f3f8; }
    .chip.agent { background:#e6f3f3; color:var(--teal); border-color:#bfe0e0; }
    .chip.asset { background:#eef0fb; color:#3a3f9e; border-color:#cdd2f0; }
    .chip.ok { background:#e8f6ec; color:#1f7a3d; border-color:#bfe5cb; }
    .chip.warn { background:#fdeaea; color:#b3261e; border-color:#f3c0bd; }
    .row { display:flex; gap:10px; padding:4px 0; font-size:.92rem; }
    .row .k { color:var(--muted); min-width:130px; }
    .row .v { word-break:break-all; font-family:monospace; font-size:.85rem; }
    .annot { color:var(--muted); font-size:.85rem; margin:0 0 12px; }
    pre { background:#0f1b2d; color:#d6e2f0; padding:14px 16px; border-radius:8px; overflow:auto; font-size:12.5px; line-height:1.5; margin:0; }
    a.didlink { color:var(--teal); text-decoration:none; font-family:monospace; font-size:.85rem; word-break:break-all; }
    a.didlink:hover { text-decoration:underline; }
    details summary { cursor:pointer; color:var(--muted); font-size:.9rem; margin-bottom:8px; }
    .err { background:#fdeaea; color:#b3261e; padding:14px 16px; border-radius:8px; }
    .empty { color:var(--muted); }
  </style>
</head>
<body>
  <header><div class="wrap"><h1>🔎 Archon DID Resolver</h1>
    <div class="sub">Resolve a <code>did:cid</code> and inspect its document, metadata, and data.</div></div></header>
  <main class="wrap">
    <div class="bar">
      <input id="did" placeholder="did:cid:…" spellcheck="false" />
      <button id="go">Resolve</button>
    </div>
    <div id="out"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const GK = params.get('gk') || 'https://archon.technology';
    const input = document.getElementById('did');
    const out = document.getElementById('out');
    const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c]));
    const short = (d) => d ? `${d.slice(0,20)}…${d.slice(-8)}` : '';
    const didLink = (d) => `<a class="didlink" href="?did=${encodeURIComponent(d)}&gk=${encodeURIComponent(GK)}">${esc(d)}</a>`;

    function row(k, v) { return `<div class="row"><div class="k">${k}</div><div class="v">${v}</div></div>`; }

    function render(doc) {
      const dd = doc.didDocument || {};
      const meta = doc.didDocumentMetadata || {};
      const reg = doc.didDocumentRegistration || {};
      const data = doc.didDocumentData || {};
      const type = reg.type || (dd.verificationMethod ? 'agent' : 'asset');
      const deactivated = !!meta.deactivated;

      let html = '';

      // Summary
      html += '<div class="card">';
      html += '<div class="chips">';
      html += `<span class="chip ${type}">${type === 'agent' ? '🔑 Agent (key-holder)' : '📄 Asset (controlled)'}</span>`;
      if (reg.registry) html += `<span class="chip">registry: ${esc(reg.registry)}</span>`;
      if (meta.versionSequence) html += `<span class="chip">version ${esc(meta.versionSequence)}</span>`;
      html += meta.confirmed ? '<span class="chip ok">✓ confirmed</span>' : '<span class="chip warn">unconfirmed</span>';
      if (deactivated) html += '<span class="chip warn">⊘ revoked</span>';
      html += '</div>';
      html += row('DID', `<span class="v">${esc(dd.id || input.value)}</span>`);
      if (dd.controller) html += row('Controller', didLink(dd.controller) + ' <span class="empty">(the agent that owns this asset)</span>');
      if (meta.created) html += row('Created', esc(meta.created));
      if (meta.updated && meta.updated !== meta.created) html += row('Updated', esc(meta.updated));
      if (meta.versionId) html += row('Version ID', `<span class="v">${esc(meta.versionId)}</span>`);
      html += '</div>';

      // Keys (agents)
      const vms = dd.verificationMethod || [];
      if (vms.length) {
        html += '<div class="card"><h2>Verification methods (keys)</h2>';
        html += '<p class="annot">Public keys this agent uses to authenticate and to sign credentials.</p>';
        vms.forEach((vm) => {
          html += row(esc(vm.id || '#key'), esc(vm.type || '') + (vm.publicKeyJwk ? ` · ${esc(vm.publicKeyJwk.crv || vm.publicKeyJwk.kty || '')}` : ''));
        });
        html += '</div>';
      }

      // Services
      const svcs = dd.service || [];
      if (svcs.length) {
        html += '<div class="card"><h2>Services</h2>';
        svcs.forEach((s) => html += row(esc(s.type || 'service'), esc(s.serviceEndpoint || '')));
        html += '</div>';
      }

      // didDocumentData — the payload
      html += '<div class="card"><h2>Document data <span class="empty" style="font-weight:400">— the substantive payload</span></h2>';
      html += '<p class="annot">Archon stores application data here: a credential\'s contents, a group\'s members, or — for a traveler profile — the HATPro data itself. Signed by the controller and versioned with the DID.</p>';
      html += Object.keys(data).length ? `<pre>${esc(JSON.stringify(data, null, 2))}</pre>` : '<p class="empty">(empty)</p>';
      html += '</div>';

      // Raw
      html += '<div class="card"><details><summary>Raw resolved document (full JSON)</summary>';
      html += `<pre>${esc(JSON.stringify(doc, null, 2))}</pre></details></div>`;

      out.innerHTML = html;
    }

    async function resolve(did) {
      did = (did || '').trim();
      if (!did.startsWith('did:')) { out.innerHTML = '<div class="err">Enter a valid did:cid identifier.</div>'; return; }
      input.value = did;
      history.replaceState(null, '', `?did=${encodeURIComponent(did)}&gk=${encodeURIComponent(GK)}`);
      out.innerHTML = '<p class="empty">Resolving…</p>';
      try {
        const res = await fetch(`${GK}/api/v1/did/${encodeURIComponent(did)}`);
        if (!res.ok) throw new Error(`gatekeeper returned ${res.status}`);
        render(await res.json());
      } catch (e) {
        out.innerHTML = `<div class="err">Could not resolve: ${esc(e.message)}<br><span class="empty">via ${esc(GK)}</span></div>`;
      }
    }

    document.getElementById('go').onclick = () => resolve(input.value);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') resolve(input.value); });
    const initial = params.get('did');
    if (initial) resolve(initial);
  </script>
</body>
</html>
