# nginx server block for hatpro.archon.technology
#
# Serves the three static apps and reverse-proxies the three backend services so the
# browser talks to same-origin paths (no CORS, one TLS cert). The in-browser traveler
# wallet talks to the public gatekeeper (https://archon.technology) directly — see the
# app's .env.production.
#
# Install:
#   sudo cp deploy/nginx/hatpro.archon.technology.conf /etc/nginx/sites-available/hatpro
#   sudo ln -s /etc/nginx/sites-available/hatpro /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d hatpro.archon.technology     # provisions TLS, edits this block
#
# Adjust APP_ROOT below if the repo is not at /opt/hatpro-archon.

server {
    listen 80;
    server_name hatpro.archon.technology;

    # set $app_root once; reused by each location
    set $app_root /opt/hatpro-archon/apps;

    # ── Backend services (reverse-proxied; trailing slash strips the path prefix) ──
    location /resort-api/    { proxy_pass http://127.0.0.1:4326/; proxy_set_header Host $host; }
    location /issuer-api/    { proxy_pass http://127.0.0.1:4327/; proxy_set_header Host $host; }
    location /trust-registry/ { proxy_pass http://127.0.0.1:4260/; proxy_set_header Host $host; }

    # ── Supplier console at /supplier/ ──
    location = /supplier { return 301 /supplier/; }   # fetch('demo.json') needs the trailing slash
    location /supplier/ {
        alias $app_root/supplier-console/dist/;
        try_files $uri $uri/ /supplier/index.html;
    }

    # ── Registry explorer at /registry/ ──
    location = /registry { return 301 /registry/; }
    location /registry/ {
        alias $app_root/registry-explorer/dist/;
        try_files $uri $uri/ /registry/index.html;
    }

    # ── Traveler wallet at the root ──
    location / {
        root $app_root/traveler-wallet/dist;
        try_files $uri $uri/ /index.html;
    }
}
