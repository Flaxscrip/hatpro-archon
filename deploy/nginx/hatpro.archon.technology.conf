# nginx for hatpro.archon.technology
#
#   /            -> welcome page (/var/www/hatpro/index.html)
#   /traveler/   -> traveler-wallet  (apps/traveler-wallet/dist)
#   /supplier/   -> supplier-console (apps/supplier-console/dist)
#   /registry/   -> registry-explorer (apps/registry-explorer/dist)
#   /resort-api/ /issuer-api/ /trust-registry/ -> reverse-proxied backend services
#
# The in-browser traveler wallet talks to the public gatekeeper https://archon.technology
# directly (see apps/traveler-wallet/.env.production). Adjust /opt/hatpro-archon if needed.
#
# Install:
#   sudo cp deploy/nginx/hatpro.archon.technology.conf /etc/nginx/sites-available/hatpro
#   (sites-enabled/hatpro should symlink to it)
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name hatpro.archon.technology;

    # ── Welcome page ──
    root /var/www/hatpro;
    index index.html;
    location = / { try_files /index.html =404; }

    # ── Backend services (trailing slash strips the prefix: /resort-api/verify -> /verify) ──
    location /resort-api/     { proxy_pass http://127.0.0.1:4326/; proxy_set_header Host $host; }
    location /issuer-api/     { proxy_pass http://127.0.0.1:4327/; proxy_set_header Host $host; }
    location /trust-registry/ { proxy_pass http://127.0.0.1:4260/; proxy_set_header Host $host; }

    # ── Apps (relative asset paths + trailing-slash redirect so fetch('demo.json') resolves) ──
    location = /traveler { return 301 /traveler/; }
    location /traveler/ {
        alias /opt/hatpro-archon/apps/traveler-wallet/dist/;
        try_files $uri $uri/ /traveler/index.html;
    }

    location = /supplier { return 301 /supplier/; }
    location /supplier/ {
        alias /opt/hatpro-archon/apps/supplier-console/dist/;
        try_files $uri $uri/ /supplier/index.html;
    }

    location = /registry { return 301 /registry/; }
    location /registry/ {
        alias /opt/hatpro-archon/apps/registry-explorer/dist/;
        try_files $uri $uri/ /registry/index.html;
    }

    # ── Anything else under / falls back to the welcome page ──
    location / { try_files $uri $uri/ /index.html; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/archon.social/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/archon.social/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = hatpro.archon.technology) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name hatpro.archon.technology;
    return 404; # managed by Certbot
}
